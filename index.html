    .luxury-compass {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 320px;
      z-index: 1;
      pointer-events: none;

    .compass-ring-1 {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 2px solid rgba(180, 140, 30, 0.4);
      border-radius: 50%;
      animation: rotateCompass 30s linear infinite;
    }

    .compass-ring-1::after {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 2px dashed rgba(180, 140, 30, 0.6);
      border-radius: 50%;
    }

    .compass-ring-2 {
      position: absolute;
      top: 40px;
      left: 40px;
      right: 40px;
      bottom: 40px;
      border: 3px dotted rgba(180, 140, 30, 0.7);
      border-radius: 50%;
      animation: rotateCompassReverse 20s linear infinite;
    }

    .compass-center-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(180, 140, 30, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulseCompass 3s ease-in-out infinite alternate;
    }

    .compass-pulse-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      border: 2px solid rgba(180, 140, 30, 0.7);
      border-radius: 50%;
      animation: pulseRipple 4s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }

    .compass-sweep {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 70%, rgba(180, 140, 30, 0.4) 100%);
      animation: rotateCompass 6s linear infinite;
      -webkit-mask-image: radial-gradient(transparent 50%, black 100%);
      mask-image: radial-gradient(transparent 50%, black 100%);
    }

    .compass-polygon {
      position: absolute;
      top: 20%;
      left: 20%;
      right: 20%;
      bottom: 20%;
      border: 2px solid rgba(180, 140, 30, 0.3);
      animation: pulsePolygon 10s ease-in-out infinite alternate;
    }

    @keyframes rotateCompass {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes rotateCompassReverse {
      0% {
        transform: rotate(360deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }

    @keyframes pulseCompass {
      0% {
        transform: translate(-50%, -50%) scale(0.9);
        opacity: 0.6;
      }

      100% {
        transform: translate(-50%, -50%) scale(1.1);
        opacity: 1;
      }
    }

    @keyframes pulseRipple {
      0% {
        width: 100px;
        height: 100px;
        opacity: 1;
      }

      100% {
        width: 450px;
        height: 450px;
        opacity: 0;
      }
    }

    @keyframes pulsePolygon {
      0% {
        transform: rotate(45deg) scale(0.9);
        border-radius: 0%;
        opacity: 0.3;
      }

      50% {
        transform: rotate(135deg) scale(1.1);
        border-radius: 20%;
        opacity: 0.7;
      }

      100% {
        transform: rotate(225deg) scale(0.9);
        border-radius: 0%;
        opacity: 0.3;
      }
    }

  <div id="root"></div>
  <script>
    (function () {
      const slides = document.querySelectorAll('.pre-slide');
      const progressBar = document.getElementById('pre-progress-bar');
      const percentageText = document.getElementById('pre-percentage');
      const preloader = document.getElementById('preloader');
      let currentSlide = 0;
      let progress = 0;
      let isSlidesDone = false;

      function nextSlide() {
        if (currentSlide < slides.length - 1) {
          slides[currentSlide].classList.remove('active');
          currentSlide++;
          slides[currentSlide].classList.add('active');
        } else {
          isSlidesDone = true;
          progress = 100;
          clearInterval(slideInterval);
        }
      }

      const slideInterval = setInterval(nextSlide, 900); // 900ms per slide

      function updateProgress() {
        if (progress < 100) {
          progress += 0.45;
          if (progress >= 99 && !isSlidesDone) {
            progress = 99; // Hold at 99% until all slides have shown
          }
          if (progress > 100) progress = 100;
          const p = Math.floor(progress);
          progressBar.style.width = p + '%';
          percentageText.innerText = p + '%';
          requestAnimationFrame(updateProgress);
        } else {
          progressBar.style.width = '100%';
          percentageText.innerText = '100%';
          setTimeout(finish, 400);
        }
      }

      function finish() {
        clearInterval(slideInterval);
        preloader.classList.add('fade-out');
        document.body.style.overflow = 'auto';
        setTimeout(() => { preloader.style.display = 'none'; }, 1200);
      }

      updateProgress();
      window.addEventListener('load', () => {
        // Optimization: Ensure preloader finishes if page loads very fast
        if (progress < 100) { /* progress continues naturally */ }
      });
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
